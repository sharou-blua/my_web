<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcash Game Player</title>
<link rel="stylesheet" href="../style.css">
<style>
body { font-family: Arial, sans-serif; background-color: #fff8e7; margin:0; padding-top:70px; display:flex; flex-direction:column; align-items:center; }
.navbar { background:#FFD600; padding:15px 20px; display:flex; justify-content:center; gap:30px; position:fixed; top:0; width:100%; z-index:500; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
.navbar a { color:#000; text-decoration:none; font-weight:bold; font-size:18px; transition:0.3s; }
.navbar a:hover, .navbar a.active { color:white; background:#F57C00; padding:5px 10px; border-radius:8px; }
.banner { background-color: #FFEB3B; text-align:center; padding:40px 20px; font-size:32px; font-weight:bold; color: #333; margin:20px auto 40px auto; border-radius:20px; width:80%; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
.input-wrapper { margin-bottom:30px; }
.input-wrapper input[type=file] { display:none; }
.input-wrapper label { padding:10px 20px; background:#FF6F00; color:white; font-weight:bold; border-radius:10px; cursor:pointer; transition:0.3s; margin:5px; display:inline-block; }
.input-wrapper label:hover { background:#F57C00; }
.flashcard-player { width:80%; max-width:600px; min-height:200px; background:#2196F3; color:white; display:flex; align-items:center; justify-content:center; border-radius:15px; font-size:28px; font-weight:bold; text-align:center; padding:20px; margin-bottom:20px; perspective:1000px; cursor:pointer; }
.flashcard-inner { width:100%; height:100%; transition: transform 0.6s; transform-style: preserve-3d; display:flex; align-items:center; justify-content:center; border-radius:15px; }
.flashcard-front, .flashcard-back { position:absolute; width:100%; height:100%; backface-visibility: hidden; display:flex; align-items:center; justify-content:center; border-radius:15px; padding:20px; }
.flashcard-front { background:#2196F3; }
.flashcard-back { background:#1ca5f4; transform: rotateY(180deg); }
.nav-buttons { display:flex; justify-content:center; gap:20px; margin-bottom:50px; }
.nav-buttons button { padding:10px 20px; font-weight:bold; border:none; border-radius:10px; cursor:pointer; background:#FF6F00; color:white; transition:0.3s; }
.nav-buttons button:hover { background:#F57C00; }
.saved-files { width:80%; max-width:600px; margin-bottom:40px; }
.saved-files h3 { margin-bottom:10px; }
.file-item { display:flex; justify-content:space-between; align-items:center; background:#FFC107; padding:10px; margin-bottom:5px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
.file-item button { margin-left:10px; padding:5px 10px; border:none; border-radius:5px; background:#FF6F00; color:white; cursor:pointer; }
.file-item button:hover { background:#F57C00; }
</style>
</head>
<body>

<nav>
  <ul>
    <li><a href="../index.html">🏠 Home</a></li>
    <li><a href="../lessons.html">📘 Lessons</a></li>
    <li><a href="../games.html">🎮 Games</a></li>
    <li><a href="../discuss.html">💬 Discuss</a></li>
    <li><a href="../status.html">📊 Status</a></li>
    <li><a href="../quizz.html">📝 Quiz</a></li>
    <li><a href="../test.html">📝 Test</a></li> </ul>
</nav>

<div class="banner">Flashcash Player</div>

<div class="input-wrapper">
  <input type="file" id="fileInput" accept=".txt">
  <label for="fileInput">Chọn file flashcards (.txt)</label>
</div>

<div class="flashcard-player" id="flashcardPlayer">
  <div class="flashcard-inner" id="flashcardInner">
    <div class="flashcard-front" id="cardFront">Chọn file để bắt đầu</div>
    <div class="flashcard-back" id="cardBack"></div>
  </div>
</div>
<div class="nav-buttons">
  <button id="prevBtn">⏮ Quay lại</button>
  <button id="nextBtn">⏭ Tiếp theo</button>
</div>

<div class="saved-files" id="savedFilesContainer">
  <h3>Danh sách file đã lưu:</h3>
  <div id="fileList"></div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const flashcardInner = document.getElementById('flashcardInner');
const cardFront = document.getElementById('cardFront');
const cardBack = document.getElementById('cardBack');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const fileList = document.getElementById('fileList');

let flashcards = [];
let currentIndex = 0;
let showingFront = true;

// Load saved files from localStorage
function loadSavedFiles(){
  fileList.innerHTML = '';
  const files = JSON.parse(localStorage.getItem('flashcashFiles') || '[]');
  files.forEach((file, idx)=>{
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `<span>${file.name}</span><div><button onclick='downloadFile(${idx})'>Download</button><button onclick='deleteFile(${idx})'>Xóa</button></div>`;
    div.onclick = ()=>{ loadFlashcardsFromText(file.content); };
    fileList.appendChild(div);
  });
}

function saveFile(name, content){
  const files = JSON.parse(localStorage.getItem('flashcashFiles') || '[]');
  files.push({name, content});
  localStorage.setItem('flashcashFiles', JSON.stringify(files));
  loadSavedFiles();
}

function downloadFile(idx){
  const files = JSON.parse(localStorage.getItem('flashcashFiles') || '[]');
  const file = files[idx];
  const blob = new Blob([file.content], {type:'text/plain'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = file.name;
  link.click();
}

function deleteFile(idx){
  let files = JSON.parse(localStorage.getItem('flashcashFiles') || '[]');
  files.splice(idx,1);
  localStorage.setItem('flashcashFiles', JSON.stringify(files));
  loadSavedFiles();
}

function loadFlashcardsFromText(text){
  flashcards = text.split(/\r?\n/).filter(l=>l.trim()!='').map(line=>{
    const parts = line.split('|');
    return {front: parts[0].trim(), back: parts[1] ? parts[1].trim() : ''};
  });
  currentIndex = 0;
  showingFront = true;
  updateCard();
}

function updateCard(){
  if(flashcards.length===0){
    cardFront.innerText = 'Không có flashcard';
    cardBack.innerText = '';
    return;
  }
  cardFront.innerText = flashcards[currentIndex].front;
  cardBack.innerText = flashcards[currentIndex].back;
  flashcardInner.style.transform = 'rotateY(0deg)';
  showingFront = true;
}

flashcardInner.addEventListener('click', ()=>{
  if(flashcards.length===0) return;
  showingFront = !showingFront;
  flashcardInner.style.transform = showingFront ? 'rotateY(0deg)' : 'rotateY(180deg)';
});

prevBtn.addEventListener('click', ()=>{
  if(flashcards.length===0) return;
  currentIndex = (currentIndex-1+flashcards.length) % flashcards.length;
  updateCard();
});

nextBtn.addEventListener('click', ()=>{
  if(flashcards.length===0) return;
  currentIndex = (currentIndex+1) % flashcards.length;
  updateCard();
});

fileInput.addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    const content = evt.target.result;
    saveFile(file.name, content);
    loadFlashcardsFromText(content);
  };
  reader.readAsText(file,'UTF-8');
});

loadSavedFiles();
</script>

</body>
</html>
