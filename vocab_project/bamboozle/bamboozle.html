<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bamboozle Game</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Arial, sans-serif; background-color: #FFFDE7; margin:0; padding-top:70px; }
.banner { background-color: #FFEB3B; text-align:center; padding:40px 20px; font-size:32px; font-weight:bold; margin:20px auto 10px auto; border-radius:20px; width:80%; box-shadow:0 4px 15px rgba(0,0,0,0.2);}
.scoreboard-box { width:80%; margin:0 auto 20px auto; display:flex; justify-content:space-around; padding:15px; border-radius:15px; background:linear-gradient(45deg,#FFEE58,#FFC107); box-shadow:0 4px 10px rgba(0,0,0,0.2);}
.team-score { flex:1; margin:0 10px; padding:10px; border-radius:10px; text-align:center; font-weight:bold; font-size:18px; color:white;}
.team1 { background:#4CAF50; }
.team2 { background:#2196F3; }
.team3 { background:#F44336; }
.team4 { background:#9C27B0; }
.board { display:grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(4, 120px); gap:15px; width:80%; margin:20px auto; }
.cell { color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:18px; border-radius:15px; cursor:pointer; text-align:center; padding:10px; transition:0.2s; }
.cell:hover { transform: scale(1.05); box-shadow:0 6px 15px rgba(0,0,0,0.3); }
.input-wrapper { text-align:center; margin-bottom:20px; }
.input-wrapper input[type="file"] { display:none; }
.input-wrapper label, .input-wrapper button { display:inline-block; padding:10px 20px; background:#FF6F00; color:white; font-weight:bold; border-radius:10px; cursor:pointer; transition:0.3s; margin:5px;}
.input-wrapper label:hover, .input-wrapper button:hover { background:#F57C00; }
.popup-bg { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index:1000; }
.popup { background:#fff; padding:20px; border-radius:15px; width:80%; max-width:500px; box-shadow:0 5px 20px rgba(0,0,0,0.4); text-align:center; animation:fadeIn 0.3s; }
.popup input { width:80%; padding:8px; font-size:16px; margin-top:10px; }
.popup button { margin-top:15px; background:#FF6F00; color:white; border:none; border-radius:10px; cursor:pointer; transition:0.3s; padding:8px 15px; }
.popup button:hover { background:#F57C00; }
#congrats { position: fixed; top:20%; left:50%; transform:translateX(-50%); background:#4CAF50; color:white; padding:20px 40px; border-radius:15px; font-size:24px; font-weight:bold; display:none; box-shadow:0 4px 15px rgba(0,0,0,0.3); z-index:2000; animation:fadeIn 0.5s; }
#leaderboard { width:60%; margin:30px auto; padding:20px; border-radius:15px; background:#FFC107; text-align:center; font-size:20px; font-weight:bold; box-shadow:0 4px 15px rgba(0,0,0,0.3); display:none; }
.correct { animation: correctAnim 0.5s; }
@keyframes correctAnim { 0% {transform:scale(1);} 50% {transform:scale(1.2);} 100% {transform:scale(1);} }
.wrong { animation: wrongAnim 0.5s; }
@keyframes wrongAnim { 0% {transform:scale(1);} 50% {transform:scale(1.2);} 100% {transform:scale(1);} }
@keyframes fadeIn { from {opacity:0; transform:scale(0.9);} to {opacity:1; transform:scale(1);} }
.navbar { background:#FFD600; padding:15px 20px; display:flex; justify-content:center; gap:30px; position:fixed; top:0; width:100%; z-index:500; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
.navbar a { color:#000; text-decoration:none; font-weight:bold; font-size:18px; transition:0.3s; }
.navbar a:hover { color:#F57C00; }
</style>
</head>
<body>

<nav>
  <ul>
    <li><a href="../index.html">🏠 Home</a></li>
    <li><a href="../lessons.html">📘 Lessons</a></li>
    <li><a href="../games.html">🎮 Games</a></li>
    <li><a href="../discuss.html">💬 Discuss</a></li>
    <li><a href="../status.html">📊 Status</a></li>
    <li><a href="../quizz.html">📝 Quiz</a></li>
    <li><a href="../test.html">📝 Test</a></li> </ul>
</nav>


<div class="banner">Bamboozle Game</div>

<div class="scoreboard-box" id="scoreboard">
  <div class="team-score team1">Team 1: 0</div>
  <div class="team-score team2">Team 2: 0</div>
  <div class="team-score team3">Team 3: 0</div>
  <div class="team-score team4">Team 4: 0</div>
</div>

<div class="input-wrapper" id="inputWrapper">
  <input type="file" id="fileInput" accept=".txt"/>
  <label for="fileInput">Chọn file câu hỏi (.txt)</label>
  <button id="setTeams">Chọn số đội & tên</button>
</div>

<div class="board" id="board"></div>

<div class="popup-bg" id="popupBg">
  <div class="popup">
    <div id="popupQuestion"></div>
    <input type="text" id="popupAnswer" placeholder="Nhập câu trả lời"/>
    <br/>
    <button id="submitAnswer">Gửi</button>
  </div>
</div>

<div id="congrats"></div>
<div id="leaderboard"></div>

<script src="bamboozle.js"></script>
</body>
</html>
